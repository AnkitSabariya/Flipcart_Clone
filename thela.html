<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flipkart Style Sarees</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f1f3f6;
    }

    h2 {
      margin-bottom: 20px;
      color: #212121;
      font-size: 24px;
    }

    .product-row {
      display: grid;
      grid-template-columns:repeat(4, 1fr);
      gap: 20px;
    }

    .product-box {
      background-color: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      transition: background-color 3.5s ease, transform 2.5s ease;
      border: 1px solid #e0e0e0;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }



    .product-box:hover img {
      background-color: #fff; /* Image background becomes white */
      transform: scale(1.05);
      border-radius: 4px;
    }

    .product-box img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      margin-bottom: 12px;
      transition: background-color 0.5s ease;
    }

    .product-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #212121;
      min-height: 42px;
      transition: color 4.5s ease;
    }

    .product-rating {
      font-size: 14px;
      color: #388e3c;
      margin-bottom: 4px;
      transition: color 0.5s ease;
    }

    .product-price {
      font-size: 16px;
      color: #e53935;
      font-weight: bold;
      transition: color 0.5s ease;
    }

    .product-offer {
      font-size: 13px;
      color: #757575;
      transition: color 0.5s ease;
    }

    @media (max-width: 768px) {
      .product-box img {
        height: 150px;
      }
    }

    @media (max-width: 480px) {
      .product-box img {
        height: 130px;
      }
    }
  </style>
</head>
<body>

  <h2>Top Trending Sarees</h2>

  <div class="product-row" id="productRow"></div>

  <script src="thela.js"></script>
</body>
</html>
